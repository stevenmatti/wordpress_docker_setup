#################################
# Wordpress + MySql + phpmyadmin
#################################

services:
  # Database
  db:
    image: mysql:8.0
    container_name: mysql
    env_file:
      - '.env'
    volumes:
      - ${DEFAULT_PATH}/db_data:/var/lib/mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    networks:
      - wpsite
  # phpmyadmin
  phpmyadmin:
    depends_on:
      - db
    image: arm64v8/phpmyadmin      # used arm64v8 for it to work on Raspberry pi
    container_name: phpmyadmin
    env_file:
      - '.env'
    restart: always
    ports:
      - ${PHP_PORT}:80    #PHP myAdmin port
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    networks:
      - wpsite
  # Wordpress
  wordpress:
    depends_on:
      - db
    image: wordpress:latest
    container_name: wordpress
    env_file:
      - '.env'
    ports:
      - ${WP_PORT}:80    #wordpress port
    restart: always
    volumes: 
      - ${DEFAULT_PATH}/wp_website:/var/www/html
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_USER: ${MYSQL_USER}
      WORDPRESS_DB_PASSWORD: ${MYSQL_PASSWORD}
    networks:
      - wpsite
networks:
  wpsite:
volumes:
  db_data:
